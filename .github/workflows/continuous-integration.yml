name: Continuous Integration

on:
  push:
    paths-ignore:
      - "docs/**"
    branches: [main]
  pull_request:
    paths-ignore:
      - "docs/**"
    branches:
      - "**"

jobs:
  Pre-commit-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Linting
        run: |
          pip install pre-commit
          pre-commit run --all-files

  Testing:
    needs: pre-commit-checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version:
          - "3.9"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
          python-version: ${{ matrix.python-version }}

      - name: Installation
        run: uv sync

      - name: Create NETRC file
        run: |
          export CANFAR_NETRC_FILE=$RUNNER_TEMP"/CANFAR_NETRC"
          echo ${{ secrets.CANFAR_NETRC }} > $CANFAR_NETRC_FILE
          echo CANFAR_NETRC_FILE=$CANFAR_NETRC_FILE >> "$GITHUB_ENV"

      - name: Obtain CADC certificate
        run: |
          export CADC_CERT=$HOME"/.ssl/cadcproxy.pem"
          uv run --no-sync cadc-get-cert --netrc-file ${{ env.CANFAR_NETRC_FILE }} --days-valid 1 --cert-filename $CADC_CERT
          echo CADC_CERT=$CADC_CERT >> "$GITHUB_ENV"

      - name: Run Tests
        run: |
          uv run --no-sync pytest tests/ --cov . --cov-report=lcov --cov-report=xml

      - name: Remove NETRC file and CADC certificate
        run: |
          echo "Removing file: "$CANFAR_NETRC_FILE
          rm $CANFAR_NETRC_FILE
          echo "Removing file: "$CADC_CERT
          rm $CADC_CERT

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: "coverage.lcov"
          fail-on-error: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
